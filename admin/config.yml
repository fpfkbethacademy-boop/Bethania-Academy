backend:
  name: github
  repo: pm6482545-lang/Bethania-Academy
  branch: main
  # This new link fixes the "Netlify Not Found" error
  base_url: https://decap-cms-github-backend.vercel.app
  auth_endpoint: /auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "announcements"
    label: "School Announcements"
    folder: "announcements"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Headline", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Message Content", name: "body", widget: "markdown"}
