<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources Explorer | Bethania Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .file-list-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        .file-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; text-decoration: none; color: #333; transition: 0.2s; }
        .file-item:hover { background: #f0f7ff; color: #1976d2; }
        .file-item i { margin-right: 15px; font-size: 1.2rem; color: #d32f2f; }
        .back-link { display: inline-block; margin-top: 20px; color: #1976d2; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="top-header"> <h1 id="folder-title">Resource Repository</h1> </div>
    <div class="about-container">
        <div class="file-list-container">
            <h2 id="grade-heading" style="color: #1976d2; margin-bottom: 20px;">Available Files</h2>
            <div id="file-list-display"></div>
            <a href="library.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Library</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const grade = params.get('grade') || 'PP1';
        document.getElementById('folder-title').innerText = grade + " Repository";
        document.getElementById('grade-heading').innerText = "Documents for " + grade;

        // --- EDIT THIS PART ONLY WHEN YOU ADD NEW FILES ---
        const schoolFiles = {
            'PP1': ['Welcome-to-PP1.pdf'],
            'PP2': ['Coloring-Exercise.pdf', 'Alphabet-Tracing.pdf'],
            'G1':  ['Math-Homework-Week1.pdf'],
            'G6':  ['KPSEA-Revision-Science.pdf']
            // Add other grades here as needed
        };
        // --------------------------------------------------

        const display = document.getElementById('file-list-display');
        const files = schoolFiles[grade] || [];

        if (files.length > 0) {
            files.forEach(fileName => {
                display.innerHTML += `
                    <a href="documents/${grade}/${fileName}" class="file-item" target="_blank">
                        <i class="fas fa-file-pdf"></i>
                        <span>${fileName.replace(/-/g, ' ')}</span>
                    </a>`;
            });
        } else {
            display.innerHTML = "<p>No files uploaded for this grade yet. Check back soon!</p>";
        }
    </script>
</body>
</html>
