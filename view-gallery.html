<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Gallery | Bethania Academy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2e7d32; --gold: #d4af37; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; text-align: center; }
        header { background: var(--primary); color: white; padding: 30px; border-bottom: 4px solid var(--gold); }
        .back-btn { color: white; text-decoration: none; border: 1px solid white; padding: 8px 15px; border-radius: 5px; font-size: 0.9rem; margin-bottom: 10px; display: inline-block; }
        
        #gallery-title { text-transform: uppercase; margin: 10px 0; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding: 20px; max-width: 1200px; margin: auto; }
        
        .media-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-bottom: 4px solid var(--primary); }
        .media-card img, .media-card video { width: 100%; height: 250px; object-fit: cover; display: block; }
        .media-name { padding: 10px; font-size: 0.85rem; font-weight: bold; color: #333; background: #fff; }
        
        .loading { padding: 50px; color: #666; font-style: italic; }
    </style>
</head>
<body>

<header>
    <a href="gallery.html" class="back-btn"><i class="fas fa-arrow-left"></i> BACK TO GALLERY SECTIONS</a>
    <h1 id="gallery-title">LOADING ALBUM...</h1>
</header>

<div id="media-container" class="gallery-grid">
    <div class="loading">Connecting to school media server...</div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const folderName = urlParams.get('folder'); 
    
    // YOUR GITHUB DETAILS
    const username = "pm6482545-lang";
    const repo = "Bethania-Academy"; 

    if (folderName) {
        document.getElementById('gallery-title').innerText = folderName + " ALBUM";
        loadMedia();
    }

    async function loadMedia() {
        const container = document.getElementById('media-container');
        try {
            // This looks inside your /gallery/ folder in GitHub
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/gallery/${folderName}`);
            const files = await response.json();
            
            container.innerHTML = ''; 
            
            if (!Array.isArray(files) || files.length === 0) {
                container.innerHTML = '<div class="loading">This album is empty. Upload photos to the "' + folderName + '" folder in GitHub to see them here!</div>';
                return;
            }

            files.forEach(file => {
                const ext = file.name.split('.').pop().toLowerCase();
                const card = document.createElement('div');
                card.className = 'media-card';

                // Check if file is an image or video
                if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) {
                    card.innerHTML = `<img src="${file.download_url}" alt="School Photo"><div class="media-name">${file.name}</div>`;
                } else if (['mp4', 'mov', 'webm'].includes(ext)) {
                    card.innerHTML = `<video controls><source src="${file.download_url}" type="video/mp4"></video><div class="media-name">${file.name}</div>`;
                } else {
                    return; // Skip other file types
                }

                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = '<div class="loading">Error loading media. Check if the folder exists in GitHub.</div>';
        }
    }
</script>
</body>
</html>
