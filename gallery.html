<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Gallery | Bethania Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gallery-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px 10%; }
        .folder-card { background: #fff; padding: 30px; border-radius: 15px; text-align: center; text-decoration: none; border-bottom: 5px solid #2e7d32; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .folder-card:hover { transform: translateY(-10px); background: #e8f5e9; }
        .folder-card i { color: #d4af37; margin-bottom: 15px; }
        .folder-card h3 { color: #2e7d32; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="top-header"><h1>SCHOOL GALLERY</h1></div>

    <div class="gallery-menu">
        <a href="view-gallery.html?folder=trips" class="folder-card">
            <i class="fas fa-bus fa-3x"></i>
            <h3>School Trips</h3>
            <p>Memories from our educational tours</p>
        </a>

        <a href="view-gallery.html?folder=sports" class="folder-card">
            <i class="fas fa-trophy fa-3x"></i>
            <h3>Sports & Games</h3>
            <p>Athletics and inter-school competitions</p>
        </a>

        <a href="view-gallery.html?folder=events" class="folder-card">
            <i class="fas fa-calendar-check fa-3x"></i>
            <h3>School Events</h3>
            <p>Prize giving, music and drama festivals</p>
        </a>

        <a href="view-gallery.html?folder=spiritual" class="folder-card">
            <i class="fas fa-church fa-3x"></i>
            <h3>Spiritual Life</h3>
            <p>Devotions and church-sponsored activities</p>
        </a>
    </div>

    <div style="text-align: center; margin-bottom: 50px;">
        <a href="index.html" class="welcome-btn">Back to Home</a>
    </div>
</body>
</html>
